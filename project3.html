<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Masters Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylesheet3.css">
</head>
<body>
    <header class="top-header">
        <img src="https://full-stack-javascript-course.vercel.app/full-stack/images/coffee_masters_logo.png" alt="Coffee Masters Logo">
        <h1>Coffee Masters</h1>
    </header>

    <main>
        <form action="#" method="POST" class="checkout-form">
            <div class="layout-grid">
                
                <section class="items-section">
                    <h3>ITEMS</h3>
                    <ul class="item-list">
                        <li class="item">
                            <span class="qty">1x</span>
                            <div class="item-info">
                                <p class="item-name">Cappuccino</p>
                                <p class="item-desc">Lite foam</p>
                            </div>
                            <span class="price">$3.35</span>
                        </li>
                        <li class="item">
                            <span class="qty">1x</span>
                            <div class="item-info">
                                <p class="item-name">Cappuccino</p>
                                <p class="item-desc">Lite milk<br>Double espresso</p>
                            </div>
                            <span class="price">$3.85</span>
                        </li>
                        <li class="item">
                            <span class="qty">1x</span>
                            <div class="item-info">
                                <p class="item-name">Croissant</p>
                                <p class="item-desc">Butter</p>
                            </div>
                            <span class="price">$2.45</span>
                        </li>
                    </ul>
                </section>

                <section class="details-section">
                    <div class="input-group">
                        <h3>NAME</h3>
                        <div class="input-wrapper">
                            <label for="order-name">Name for order</label>
                            <input type="text" id="order-name" name="order-name" value="Ford Prefect" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <h3>PAYMENT</h3>
                        <div class="input-wrapper">
                            <label for="card-number">Card number</label>
                            <input type="text" id="card-number" name="card-number" value="1234 5678 9012 3456" required>
                        </div>
                        <div class="input-wrapper ccv-wrapper">
                            <label for="ccv">CCV Number</label>
                            <input type="text" id="ccv" name="ccv" value="001" required>
                        </div>
                    </div>
                </section>
            </div>

            <section class="order-summary">
                <table class="totals-table">
                    <tr>
                        <th>Subtotal:</th>
                        <td>$9.65</td>
                    </tr>
                    <tr>
                        <th>Tax:</th>
                        <td>$0.82</td>
                    </tr>
                    <tr class="total-row">
                        <th>Total:</th>
                        <td><strong>$10.47</strong></td>
                    </tr>
                </table>
                <p>its not the part of the assiment</p>
                <button type="submit" class="place-order-btn">Place order</button>
            </section>
        </form>
    </main>
</body>
</html>
