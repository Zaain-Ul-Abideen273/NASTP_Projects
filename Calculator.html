<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASTP Core Subsystem: Precision Calculator</title>
  <link rel="stylesheet" href="calculator.css">
</head>
<body>

  <div class="calc-wrapper">
    <div class="screen-container">
      <div class="screen-history" id="screen-history"></div>
      <div class="screen-current" id="screen-current">0</div>
    </div>

    <div class="button-grid">
      <button type="button" class="double-span action-clear">C</button>
      <button type="button">&larr;</button>
      <button type="button" class="action-orange">&divide;</button>

      <button type="button">7</button>
      <button type="button">8</button>
      <button type="button">9</button>
      <button type="button" class="action-orange">&times;</button>

      <button type="button">4</button>
      <button type="button">5</button>
      <button type="button">6</button>
      <button type="button" class="action-orange">&minus;</button>

      <button type="button">1</button>
      <button type="button">2</button>
      <button type="button">3</button>
      <button type="button" class="action-orange">&plus;</button>

      <button type="button">0</button>
      <button type="button">.</button>
      <button type="button" class="double-span action-orange">=</button>
    </div>
  </div>
  <script src="calculator.js"></script>
</body>
</html>
